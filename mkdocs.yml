# MkDocs Configuration - ATOMVS Time Planner Terminal
# Atualizado: 2026-03-19 (ADR-039 Fases 1-3 — Diátaxis)
# Referência: ADR-027 (Tooling), ADR-039 (Framework)

site_name: ATOMVS Time Planner Terminal
site_description: Terminal app para gerenciamento de tempo baseada em Time Blocking e Atomic Habits
site_author: Fábio de Lima
site_url: https://gitlab.com/delimafabio/atomvs-timeblock-terminal
repo_name: atomvs-timeblock-terminal
repo_url: https://github.com/fabiodelllima/atomvs-timeblock-terminal
# edit_uri removido — GitHub é mirror read-only

# ==============================================================================
# THEME
# ==============================================================================
theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro
  font:
    text: Roboto
    code: Roboto Mono

