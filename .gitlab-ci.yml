stages:
  - quality
  - test
  - coverage
  - security
  - sync
default:
  timeout: 10m
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - scheduler_failure
variables:
  CI_IMAGE: $CI_REGISTRY_IMAGE/ci:latest
lint:
  stage: quality
  image: $CI_IMAGE
  before_script:
    - pip install --no-deps -e .
  script:
    - ruff check src/ tests/
    - ruff format --check src/ tests/
test:unit:
  stage: test
  image: $CI_IMAGE
  before_script:
    - pip install --no-deps -e .
  script:
    - coverage run --data-file=.coverage.unit -m pytest tests/unit/ -v --tb=short
  artifacts:
    paths:
      - .coverage.unit
    expire_in: 1 hour
test:integration:
  timeout: 60m
  stage: test
  image: $CI_IMAGE
  before_script:
    - pip install --no-deps -e .
    - pip install pytest-xdist
  script:
    - COVERAGE_FILE=.coverage.integration python -m pytest tests/integration/ tests/bdd/ -v --tb=short -n auto --dist=loadfile --cov=timeblock --no-cov-on-fail --cov-fail-under=0
  artifacts:
    paths:
      - .coverage.integration
    expire_in: 1 hour
test:e2e:
  timeout: 60m
  stage: test
  image: $CI_IMAGE
  before_script:
    - pip install --no-deps -e .
  script:
    - coverage run --data-file=.coverage.e2e -m pytest tests/e2e/ -v --tb=short --ignore=tests/e2e/test_snapshots.py --ignore=tests/e2e/test_snapshot_cruds.py
  artifacts:
    paths:
      - .coverage.e2e
    expire_in: 1 hour
test:typecheck:
  stage: test
  image: $CI_IMAGE
  before_script:
    - pip install --no-deps -e .
  script:
    - mypy src/timeblock --check-untyped-defs
  timeout: 15m
coverage:report:
  stage: coverage
  image: $CI_IMAGE
  before_script:
    - pip install --no-deps -e .
  needs:
    - job: test:unit
      artifacts: true
    - job: test:integration
      artifacts: true
    - job: test:e2e
      artifacts: true
  script:
    - ls -la .coverage* || echo "No coverage files found"
    - coverage combine .coverage.unit .coverage.integration .coverage.e2e
    - coverage report --fail-under=80
    - coverage xml -o coverage.xml
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
security:bandit:
  stage: security
  image: $CI_IMAGE
  needs: []
  before_script: []
  script:
    - bandit -r src/timeblock -f json -o bandit-report.json || true
    - bandit -r src/timeblock -ll
  artifacts:
    paths:
      - bandit-report.json
    when: always
security:deps:
  stage: security
  image: $CI_IMAGE
  needs: []
  before_script: []
  script:
    - pip install -r requirements.txt --quiet
    - pip-audit --format json --output pip-audit-report.json
    - pip-audit
  timeout: 10m
  artifacts:
    paths:
      - pip-audit-report.json
    when: always
sync:github:
  needs: ["test:unit", "test:integration", "test:e2e"]
  stage: sync
  before_script: []
  script:
    - git fetch --unshallow || true
    - git remote add github https://x-access-token:${GITHUB_TOKEN}@github.com/fabiodelllima/atomvs-timeblock-terminal.git
    - |
      if [ "$CI_COMMIT_BRANCH" = "main" ] || [ "$CI_COMMIT_BRANCH" = "develop" ]; then
        git push github HEAD:${CI_COMMIT_REF_NAME}
      else
        git push github HEAD:${CI_COMMIT_REF_NAME} --force
      fi
    - git push github --tags
  rules:
    - if: $CI_COMMIT_TAG
      when: on_success
    - if: $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "main"
      when: on_success
